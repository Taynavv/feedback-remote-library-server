name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install pytest fastapi httpx ruff
          pip install -r requirements.txt  # iroh, so the iroh tunnel tests run for real

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -v
