name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install pytest fastapi httpx uvicorn ruff  # uvicorn: the real-ASGI iroh-tunnel regression test
          pip install -r requirements.txt  # iroh, so the iroh tunnel tests run for real

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -v

      - name: Check tag matches plugin.json version
        run: |
          python - <<'PY'
          import json, os, sys
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          ver = json.load(open("plugin.json"))["version"]
          if tag != ver:
              sys.exit(f"tag v{tag} != plugin.json version {ver} — bump plugin.json before tagging")
          PY

      - name: Build plugin zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="feedback-remote-library-server"
          mkdir -p "dist/$NAME"
          cp -r plugin.json requirements.txt routes.py screen.html screen.js settings.html              remote_library_server assets README.md LICENSE "dist/$NAME/"
          find "dist/$NAME" -name '__pycache__' -type d -prune -exec rm -rf {} +
          # Fail the build if the manifest references a file that did not get packaged
          python - "$NAME" <<'PY'
          import json, sys
          from pathlib import Path
          root = Path("dist") / sys.argv[1]
          manifest = json.loads((root / "plugin.json").read_text())
          missing = [manifest[k] for k in ("icon", "screen", "script", "routes")
                     if manifest.get(k) and not (root / manifest[k]).exists()]
          settings_html = (manifest.get("settings") or {}).get("html")
          if settings_html and not (root / settings_html).exists():
              missing.append(settings_html)
          if missing:
              sys.exit(f"packaged plugin is missing manifest-referenced files: {missing}")
          PY
          cd dist
          zip -r "${NAME}-${VERSION}.zip" "$NAME"
          unzip -l "${NAME}-${VERSION}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME"             "dist/feedback-remote-library-server-${VERSION}.zip"             --title "feedback-remote-library-server ${GITHUB_REF_NAME}"             --generate-notes
