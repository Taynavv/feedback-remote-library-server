<div id="remote-library-server-root" class="mx-auto max-w-3xl px-6 pt-24 pb-16">
  <button onclick="showScreen('home')" class="mb-6 flex items-center gap-1 text-sm text-gray-500 hover:text-white">
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Back
  </button>

  <section class="space-y-4">
    <div class="flex items-center justify-between gap-3">
      <div class="min-w-0">
        <h2 class="text-3xl font-bold text-white">Remote Library Server</h2>
        <div id="remote-library-server-message" class="mt-2 min-h-5 text-sm text-gray-400"></div>
        <p id="remote-library-server-subtitle" class="mt-1 text-sm text-gray-400"></p>
      </div>
      <div class="flex flex-shrink-0 items-center gap-2">
        <button class="rounded-lg bg-dark-600 px-3 py-2 text-sm text-gray-300 transition hover:bg-dark-500 hover:text-white" data-rls-refresh>Refresh</button>
      </div>
    </div>

    <div id="remote-library-server-status" class="mt-4"></div>

    <div class="rounded-lg border border-gray-800/50 bg-dark-700/50 p-4">
      <div class="mb-3 flex items-center justify-between gap-3">
        <h3 class="text-base font-semibold text-white">Settings</h3>
        <button class="rounded-lg bg-dark-600 px-3 py-2 text-sm text-gray-300 transition hover:bg-dark-500 hover:text-white" data-rls-save>Save</button>
      </div>
      <div class="grid gap-3 md:grid-cols-2">
        <label class="flex items-center gap-2 text-sm text-gray-300 md:col-span-2">
          <input id="rls-enabled" type="checkbox" class="h-4 w-4 rounded border-gray-700 bg-dark-800" />
          Autostart
        </label>
        <label class="flex items-start gap-2 text-sm text-gray-300 md:col-span-2">
          <input id="rls-share-nam-tone-assets" type="checkbox" class="mt-0.5 h-4 w-4 rounded border-gray-700 bg-dark-800" />
          <span>
            <span class="block">Share NAM tone presets and assets</span>
            <span class="block text-xs text-gray-500">Allows clients to sync mapped NAM presets, models, and IRs for downloaded songs.</span>
          </span>
        </label>
        <label class="space-y-1 text-sm text-gray-300 md:col-span-2">
          <span class="block text-xs uppercase text-gray-500">Source Name</span>
          <input id="rls-source-name" type="text" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" style="background:#0f172a;color:#f8fafc;" />
        </label>
        <label class="space-y-1 text-sm text-gray-300">
          <span class="block text-xs uppercase text-gray-500">Host</span>
          <input id="rls-host" type="text" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" style="background:#0f172a;color:#f8fafc;" />
        </label>
        <label class="space-y-1 text-sm text-gray-300">
          <span class="block text-xs uppercase text-gray-500">Port</span>
          <input id="rls-port" type="number" min="1" max="65535" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" style="background:#0f172a;color:#f8fafc;" />
        </label>
        <label class="space-y-1 text-sm text-gray-300 md:col-span-2">
          <span class="block text-xs uppercase text-gray-500">Auth token (optional)</span>
          <input id="rls-auth-token" type="password" autocomplete="off" spellcheck="false" placeholder="Leave blank to allow open access on a trusted network" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" style="background:#0f172a;color:#f8fafc;" />
          <span class="block text-xs text-gray-500">Required to browse or download when set. Share it with the client. Strongly recommended if you bind to <code>0.0.0.0</code>, and for iroh sharing below.</span>
        </label>
        <label class="flex items-start gap-2 text-sm text-gray-300 md:col-span-2">
          <input id="rls-iroh-enabled" type="checkbox" class="mt-0.5 h-4 w-4 rounded border-gray-700 bg-dark-800" />
          <span>
            <span class="block">Share over iroh (peer-to-peer, no port forwarding)</span>
            <span class="block text-xs text-gray-500">Makes this server reachable by a <strong>Library ID</strong> from anywhere over the internet, with no router setup — it appears above once running. Followers add it in Remote Client → + → “Remote Server over iroh”. <strong>This reaches the public internet regardless of the Host setting above</strong>, so set an auth token unless you want anyone with the ID to browse.</span>
          </span>
        </label>
        <details class="md:col-span-2 rounded-lg border border-gray-800/50 bg-dark-800/30 p-3">
          <summary class="cursor-pointer text-xs uppercase text-gray-500">iroh advanced limits</summary>
          <p class="mt-2 text-xs text-gray-500">Abuse limits for the peer-to-peer tunnel. The defaults suit sharing with a handful of followers — <strong>leave them as-is unless you have a specific reason to change them.</strong></p>
          <div class="mt-3 grid gap-3 sm:grid-cols-2">
            <label class="space-y-1 text-sm text-gray-300">
              <span class="block text-xs uppercase text-gray-500">Max concurrent streams</span>
              <input id="rls-iroh-max-streams" type="number" min="1" max="4096" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" style="background:#0f172a;color:#f8fafc;" />
            </label>
            <label class="space-y-1 text-sm text-gray-300">
              <span class="block text-xs uppercase text-gray-500">Stream idle timeout (seconds)</span>
              <input id="rls-iroh-idle-timeout" type="number" min="10" max="3600" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" style="background:#0f172a;color:#f8fafc;" />
            </label>
          </div>
        </details>
      </div>
    </div>
  </section>
</div>
